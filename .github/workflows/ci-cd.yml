name: CI/CD Pipeline - Backend

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ──────────────────────────────────────────────────────────────
  # Job 1 : Compilation, vérification du code et tests unitaires
  # S'exécute sur toutes les branches (push et pull request)
  # ──────────────────────────────────────────────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code source
        uses: actions/checkout@v4

      - name: Mise en cache des dépendances Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Vérification du formatage du code
        run: cargo fmt --all -- --check

      - name: Analyse statique avec Clippy
        run: cargo clippy -- -D warnings

      - name: Compilation en mode release
        run: cargo build --release

      - name: Exécution des tests unitaires
        run: cargo test

  # ──────────────────────────────────────────────────────────────
  # Job 2 : Migrations de la base de données (Neon PostgreSQL)
  # S'exécute uniquement sur la branche main après le build
  # Applique les fichiers SQL du dossier ./migrations via sqlx-cli
  # ──────────────────────────────────────────────────────────────
  migrate:
    name: Run Database Migrations
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Récupération du code source
        uses: actions/checkout@v4

      - name: Mise en cache des dépendances Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Installation de sqlx-cli (PostgreSQL + TLS natif pour Neon)
        run: cargo install sqlx-cli --no-default-features --features postgres,native-tls

      - name: Application des migrations sur la base Neon
        env:
          # DATABASE_URL pointe vers la connexion directe Neon (sans pooler)
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: sqlx migrate run --source ./migrations

  # ──────────────────────────────────────────────────────────────
  # Job 3 : Construction et publication de l'image Docker
  # S'exécute uniquement après les migrations réussies sur main
  # Publie l'image sur Docker Hub avec les tags : sha court + latest
  # ──────────────────────────────────────────────────────────────
  deploy:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [migrate]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Récupération du code source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/truegather-backend
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max