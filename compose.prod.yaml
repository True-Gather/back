# =============================================================
# Fichier Docker Compose pour la PRODUCTION
# Différences par rapport à compose.yaml (développement) :
#   - pgAdmin supprimé (inutile en prod, risque de sécurité)
#   - PostgreSQL sans port exposé publiquement
#   - Redis sans port exposé publiquement
#   - Mots de passe et secrets via variables d'environnement
#   - Cookie sécurisé activé (HTTPS uniquement)
# =============================================================

services:
  postgres:
    image: postgres:15
    container_name: truegather-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # Pas de port exposé publiquement — accessible uniquement via le réseau Docker interne
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tg_user -d truegather"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - truegather-network

  # pgAdmin supprimé en production : ne pas exposer d'interface d'administration publique

  redis:
    image: redis:7
    container_name: truegather-redis
    restart: unless-stopped
    # Pas de port exposé publiquement — accessible uniquement via le réseau Docker interne
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - truegather-network

  keycloak:
    image: quay.io/keycloak/keycloak:26.5.5
    container_name: truegather-keycloak
    restart: unless-stopped
    command: start --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KC_HTTP_PORT: 8080
      KC_HOSTNAME: ${KC_HOSTNAME}
      KC_HOSTNAME_STRICT: "true"
    ports:
      - "8081:8080"
    volumes:
      - ./keycloak/import:/opt/keycloak/data/import
      - ./keycloak/themes:/opt/keycloak/themes
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - truegather-network

  backend:
    image: ${DOCKERHUB_USERNAME}/truegather-backend:latest
    container_name: truegather-backend
    restart: unless-stopped
    environment:
      APP__SERVER__HOST: 0.0.0.0
      APP__SERVER__PORT: 8080

      # Connexion à Neon (pooler) — injectée depuis les secrets du serveur
      APP__DATABASE__URL: ${APP__DATABASE__URL}
      APP__REDIS__URL: redis://redis:6379

      APP__KEYCLOAK__ISSUER_URL_INTERNAL: http://keycloak:8080/realms/truegather
      APP__KEYCLOAK__ISSUER_URL_PUBLIC: ${KC_ISSUER_URL_PUBLIC}
      APP__KEYCLOAK__CLIENT_ID: truegather-backend
      APP__KEYCLOAK__CLIENT_SECRET: ${APP__KEYCLOAK__CLIENT_SECRET}

      APP__BACKEND__BASE_URL: ${BACKEND_BASE_URL}
      APP__FRONTEND__BASE_URL: ${FRONTEND_BASE_URL}

      APP__AUTH__COOKIE_NAME: tg_session
      # Cookie sécurisé activé en production (HTTPS obligatoire)
      APP__AUTH__COOKIE_SECURE: "true"

      # Clé API Brevo — injectée depuis les secrets du serveur
      APP__MAIL__BREVO_API_KEY: ${APP__MAIL__BREVO_API_KEY}

      RUST_LOG: warn
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_started
    networks:
      - truegather-network

networks:
  truegather-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
